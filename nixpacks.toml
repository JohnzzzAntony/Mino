[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install -g bun", "bun install --frozen-lockfile"]

[phases.build]
cmds = [
  "bunx prisma generate",
  "bun run next build",
  "cp -r .next/static .next/standalone/.next/static",
  "cp -r public .next/standalone/public"
]

[start]
cmd = "node .next/standalone/server.js"
